name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(awk '/^version:/{print $2; exit}' manifest.yaml)"
          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag v${VERSION} does not match manifest.yaml version ${MANIFEST_VERSION}"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "package=bsqb-${VERSION}.difypkg" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh requirements.txt
        run: |
          pip install "bsqb>=0.2.1" "dify_plugin>=0.9.0" "requests>=2.32.0"
          pip freeze | grep -v '^-e' | sort > requirements.txt

      - name: Install Dify plugin CLI
        run: |
          curl -fsSL -o dify-plugin \
            "https://github.com/langgenius/dify-plugin-daemon/releases/download/0.6.2/dify-plugin-linux-amd64"
          chmod +x dify-plugin
          ./dify-plugin version

      - name: Package plugin
        run: |
          ./dify-plugin plugin package . -o "${{ steps.version.outputs.package }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.version.outputs.package }}
